general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprlock
}

listener {
    timeout = 300
    on-timeout = hyprlock
}

listener {
    timeout = 600
    on-timeout = systemctl suspend
}

# Close Todo List after 20 minutes of inactivity
listener {
    timeout = 300
    on-timeout = hyprctl dispatch closewindow class:todo_scratch
}

# Close Obsidian after 45 minutes of inactivity
listener {
    timeout = 2700
    on-timeout = hyprctl dispatch closewindow class:obsidian
}
